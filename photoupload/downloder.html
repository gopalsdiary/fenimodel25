<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulk Photo Downloader</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Segoe UI, Arial, sans-serif; background: #f8f9fa; margin: 0; }
        .container { max-width: 1300px; margin: 1.5rem auto; background: #fff; border-radius: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 1.5rem 2rem; }
        h1 { text-align: center; margin-bottom: 1rem; font-size: 1.4rem; }

        /* ── Filter bar ── */
        .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: #f0f4ff; border: 1px solid #c7d5f5; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; }
        .filter-bar label { font-size: 13px; font-weight: 600; color: #444; }
        .filter-bar select { padding: 6px 10px; border-radius: 5px; border: 1px solid #2196f3; font-size: 13px; background: #fff; color: #222; }
        .filter-bar select:disabled { background: #e9ecef; color: #888; }

        /* ── Controls bar ── */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
        .ctrl-left { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
        .ctrl-btn { padding: 7px 14px; border-radius: 5px; border: 1px solid #2196f3; background: #2196f3; color: #fff; font-weight: bold; cursor: pointer; font-size: 13px; }
        .ctrl-btn:disabled { background: #bdbdbd; border-color: #bdbdbd; cursor: not-allowed; }
        .ctrl-btn.danger { background: #e53935; border-color: #e53935; }
        input[type=search] { padding: 7px 10px; border-radius: 5px; border: 1px solid #2196f3; background: #fff; color: #111; font-size: 13px; width: 200px; }

        /* ── Size settings ── */
        .size-bar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; background: #fffbea; border: 1px solid #ffe082; border-radius: 8px; padding: 8px 14px; margin-bottom: 12px; font-size: 13px; }
        .size-bar label { font-weight: 600; color: #7b5e00; }
        .size-bar input[type=number] { width: 72px; padding: 5px 7px; border-radius: 4px; border: 1px solid #ffb300; font-size: 13px; background: #fff; }
        .size-bar small { color: #888; }

        /* ── Grid ── */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
        .img-card { background: #f1f8ff; border-radius: 8px; padding: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; }
        .img-card img { width: 100px; height: 100px; border-radius: 6px; margin-bottom: 5px; object-fit: cover; display: block; margin-left: auto; margin-right: auto; }
        .img-card input[type=checkbox] { position: absolute; top: 8px; right: 8px; transform: scale(1.3); }
        .img-card .card-btn { margin-top: 5px; padding: 3px 10px; font-size: 12px; border-radius: 4px; border: 1px solid #2196f3; background: #2196f3; color: #fff; cursor: pointer; }
        .img-card .card-btn:disabled { background: #bdbdbd; border-color: #bdbdbd; cursor: not-allowed; }

        /* ── Pagination ── */
        .page-bar { display: flex; align-items: center; gap: 8px; margin-top: 14px; justify-content: center; }
        .page-bar button { padding: 6px 14px; border-radius: 4px; border: 1px solid #2196f3; background: #2196f3; color: #fff; font-weight: bold; cursor: pointer; }
        .page-bar button:disabled { background: #bdbdbd; border-color: #bdbdbd; cursor: not-allowed; }
        #pageInfo { font-size: 13px; color: #555; }
        #status { font-size: 13px; color: #555; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../login/auth-check_copy.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="container">
    <h1>Bulk Photo Downloader</h1>

    <!-- ── Session / Class / Section Filters ── -->
    <div class="filter-bar">
        <label>Session:</label>
        <select id="sessionSel"><option value="">-- Session --</option></select>
        <label>Class:</label>
        <select id="classSel" disabled><option value="">-- All --</option></select>
        <label>Section:</label>
        <select id="sectionSel" disabled><option value="">-- All --</option></select>
        <button class="ctrl-btn" id="loadBtn" style="background:#388e3c;border-color:#388e3c;">Load Photos</button>
        <span id="status">Ready</span>
    </div>

    <!-- ── Download Size Settings ── -->
    <div class="size-bar">
        <label>Image Size:</label>
        <label>W (px):</label>
        <input type="number" id="outWidth" value="300" min="50" max="3000">
        <label>H (px):</label>
        <input type="number" id="outHeight" value="400" min="50" max="3000">
        <label>Max KB:</label>
        <input type="number" id="maxKB" value="100" min="10" max="5000">
        <small>↑ Size applied on every download. Leave Max KB=0 for best quality.</small>
    </div>

    <!-- ── Action Controls ── -->
    <div class="controls">
        <div class="ctrl-left">
            <button class="ctrl-btn" id="selectAllBtn">Select All Page</button>
            <button class="ctrl-btn" id="downloadJpgBtn" disabled>Download Selected (JPG)</button>
            <button class="ctrl-btn" id="downloadZipBtn" disabled>Download Selected (ZIP)</button>
            <input type="search" id="searchBox" placeholder="Search IID / Name…">
        </div>
        <div class="page-bar">
            <button id="prevPageBtn">Prev</button>
            <span id="pageInfo">Page 1 of 1</span>
            <button id="nextPageBtn">Next</button>
        </div>
    </div>

    <div class="grid" id="imageGrid"></div>
</div>

<script>
const PAGE_SIZE = 25;
let links    = [];  // {url, iid, name, cls, section, roll}
let filtered = [];
let currentPage = 1;
let totalPages  = 1;

// ── Supabase ──────────────────────────────────────────────────────────────
const SUPA_URL = 'https://rtfefxghfbtirfnlbucb.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0ZmVmeGdoZmJ0aXJmbmxidWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA1MDg3OTcsImV4cCI6MjA1NjA4NDc5N30.fb7_myCmFzbV7WPNjFN_NEl4z0sOmRCefnkQbk6c10w';
let sb;
function getClient(){
    if(sb) return sb;
    if(!window.supabase) return null;
    // prefer shared client created by auth-check utility if available
    if(typeof window.getSharedSupabaseClient === 'function'){
        sb = window.getSharedSupabaseClient();
        if(sb) return sb;
    }
    // fall back to manual creation using common global store
    window.__supabaseClients = window.__supabaseClients || {};
    sb = window.__supabaseClients[SUPA_URL] || window.supabase.createClient(SUPA_URL, SUPA_KEY);
    window.__supabaseClients[SUPA_URL] = sb;
    return sb;
}

function setStatus(msg){ document.getElementById('status').textContent = msg; }

// ── Session column discovery ──────────────────────────────────────────────
let sessionCols = { classes:new Set(), sections:new Set(), rolls:new Set() };

async function discoverSessionCols(){
    const client = getClient(); if(!client) return;
    try{
        const { data } = await client.from('student_database').select('*').limit(1);
        const keys = (data && data[0]) ? Object.keys(data[0]) : [];
        keys.forEach(k=>{
            if(/^class_\d{4}$/.test(k))   sessionCols.classes.add(k);
            if(/^section_\d{4}$/.test(k)) sessionCols.sections.add(k);
            if(/^roll_\d{4}$/.test(k))    sessionCols.rolls.add(k);
        });
        populateSessionDropdown();
    }catch(e){ console.warn('discoverSessionCols failed', e); }
}

function populateSessionDropdown(){
    const sel = document.getElementById('sessionSel');
    const years = [...sessionCols.classes].map(c=>c.replace('class_','')).sort().reverse();
    sel.innerHTML = '<option value="">-- Session --</option>';
    years.forEach(y=>{ const o=document.createElement('option'); o.value=y; o.textContent=y; sel.appendChild(o); });
    if(years.length) sel.value = years[0]; // default to latest
    onSessionChange();
}

// ── Dynamic Class / Section dropdowns ────────────────────────────────────
async function onSessionChange(){
    const ses = document.getElementById('sessionSel').value;
    const classSel   = document.getElementById('classSel');
    const sectionSel = document.getElementById('sectionSel');
    classSel.innerHTML   = '<option value="">-- All --</option>';
    sectionSel.innerHTML = '<option value="">-- All --</option>';
    classSel.disabled   = !ses;
    sectionSel.disabled = true;
    links = []; filtered = [];
    renderPage();
    if(!ses) return;

    const client = getClient(); if(!client) return;
    setStatus('Loading classes…');
    const clsKey = `class_${ses}`;
    const { data, error } = await client
        .from('student_database')
        .select(clsKey)
        .not(clsKey,'is',null)
        .not('student_photo_url','is',null)
        .limit(10000);
    if(error){ setStatus('Error fetching classes'); return; }
    const classes = [...new Set((data||[]).map(r=>r[clsKey]).filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));
    classes.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent='Class '+c; classSel.appendChild(o); });
    classSel.disabled = false;
    setStatus(`${classes.length} classes found. Select class or load all.`);
}

async function onClassChange(){
    const ses     = document.getElementById('sessionSel').value;
    const cls     = document.getElementById('classSel').value;
    const sectionSel = document.getElementById('sectionSel');
    sectionSel.innerHTML = '<option value="">-- All --</option>';
    sectionSel.disabled  = true;
    if(!ses || !cls) return;

    const client   = getClient(); if(!client) return;
    const clsKey = `class_${ses}`;
    const secKey = `section_${ses}`;
    setStatus('Loading sections…');
    const { data, error } = await client
        .from('student_database')
        .select(secKey)
        .eq(clsKey, cls)
        .not(secKey,'is',null)
        .limit(5000);
    if(error){ setStatus('Error fetching sections'); return; }
    const sections = [...new Set((data||[]).map(r=>r[secKey]).filter(Boolean))].sort();
    sections.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent='Section '+s; sectionSel.appendChild(o); });
    sectionSel.disabled = (sections.length === 0);
    setStatus(`${sections.length} sections found.`);
}

// ── Fetch photos ──────────────────────────────────────────────────────────
async function fetchPhotos(){
    const client = getClient();
    if(!client){ setStatus('Supabase not ready'); return; }
    const ses     = document.getElementById('sessionSel').value;
    if(!ses){ setStatus('Please select a session first'); return; }

    const cls     = document.getElementById('classSel').value;
    const section = document.getElementById('sectionSel').value;
    const clsKey  = `class_${ses}`;
    const secKey  = `section_${ses}`;
    const rollKey = `roll_${ses}`;

    setStatus('Loading photos…');
    try{
        let query = client
            .from('student_database')
            .select(`iid, student_name_en, student_photo_url, ${clsKey}, ${secKey}, ${rollKey}`)
            .not('student_photo_url','is',null)
            .limit(10000);
        if(cls)     query = query.eq(clsKey, cls);
        if(section) query = query.eq(secKey, section);

        const { data, error } = await query;
        if(error) throw error;

        links = (data||[])
            .filter(r=>r.student_photo_url && r.student_photo_url.trim()!=='')
            .map(r=>({
                url:     r.student_photo_url.trim(),
                iid:     String(r.iid||''),
                name:    String(r.student_name_en||''),
                cls:     String(r[clsKey]||''),
                section: String(r[secKey]||''),
                roll:    String(r[rollKey]||'')
            }));
        links.sort((a,b)=>a.cls.localeCompare(b.cls,undefined,{numeric:true}) || a.section.localeCompare(b.section) || a.roll.localeCompare(b.roll,undefined,{numeric:true}));
        filtered = links.slice();
        totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
        currentPage = 1;
        renderPage();
        setStatus(`Loaded ${links.length} photos`);
    }catch(e){ console.error(e); setStatus('Load failed: '+e.message); links=[]; filtered=[]; renderPage(); }
}

// ── Search ────────────────────────────────────────────────────────────────
function applySearch(){
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    filtered = q
        ? links.filter(it=> it.iid.toLowerCase().includes(q) || it.name.toLowerCase().includes(q) || it.cls.toLowerCase().includes(q) || it.section.toLowerCase().includes(q) || it.roll.toLowerCase().includes(q))
        : links.slice();
    totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
    currentPage = 1;
    renderPage();
}

// ── Image processing (resize + compress to target KB) ────────────────────
// Fetches the image URL via fetch() → local blob URL → untainted canvas
async function processImage(srcUrl, outW, outH, maxKB){
    // Fetch raw bytes so canvas is never tainted (avoids CORS SecurityError)
    const resp = await fetch(srcUrl);
    if(!resp.ok) throw new Error(`Fetch failed: ${resp.status}`);
    const srcBlob = await resp.blob();
    const blobUrl = URL.createObjectURL(srcBlob);

    const img = await new Promise((res, rej)=>{
        const i = new Image();
        i.onload = ()=>res(i);
        i.onerror = ()=>rej(new Error('Image load error'));
        i.src = blobUrl;
    });

    const canvas = document.createElement('canvas');
    canvas.width  = outW || img.naturalWidth;
    canvas.height = outH || img.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    URL.revokeObjectURL(blobUrl);

    if(!maxKB || maxKB <= 0){
        return await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.92));
    }
    const target = maxKB * 1024;
    // Binary-search quality to hit target size
    let lo=0.05, hi=1.0, bestBlob=null;
    for(let i=0;i<12;i++){
        const mid = (lo+hi)/2;
        const blob = await new Promise(res=>canvas.toBlob(res,'image/jpeg',mid));
        if(blob.size <= target){ bestBlob=blob; lo=mid; }
        else { hi=mid; }
        if(hi-lo < 0.01) break;
    }
    if(!bestBlob){
        bestBlob = await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.1));
    }
    return bestBlob;
}

function getSizeSettings(){
    const w  = parseInt(document.getElementById('outWidth').value)  || 0;
    const h  = parseInt(document.getElementById('outHeight').value) || 0;
    const kb = parseFloat(document.getElementById('maxKB').value)   || 0;
    return { w, h, kb };
}

// ── Single file download with save-picker ────────────────────────────────
async function downloadBlob(blob, suggestedName){
    if(window.showSaveFilePicker){
        try{
            const fh = await window.showSaveFilePicker({
                suggestedName,
                types:[{ description:'JPEG Image', accept:{'image/jpeg':['.jpg','.jpeg']} }]
            });
            const writable = await fh.createWritable();
            await writable.write(blob);
            await writable.close();
            return;
        }catch(e){ if(e.name==='AbortError') return; /* fall through */ }
    }
    // Fallback: normal anchor download
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = suggestedName;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 2000);
}

// ── Bulk JPG → directory ──────────────────────────────────────────────────
async function bulkJpgToDirectory(items){
    const { w, h, kb } = getSizeSettings();
    // Try File System Access API (directory)
    let dirHandle = null;
    if(window.showDirectoryPicker){
        try{ dirHandle = await window.showDirectoryPicker({ mode:'readwrite' }); }
        catch(e){ if(e.name==='AbortError') return; }
    }

    let success=0, fail=0;
    setStatus('Downloading…');
    for(const item of items){
        const fname = item.url.split('/').pop();
        try{
            const blob = await processImage(item.url, w, h, kb);
            if(!blob){ fail++; continue; }
            if(dirHandle){
                const fh = await dirHandle.getFileHandle(fname, {create:true});
                const wr = await fh.createWritable();
                await wr.write(blob);
                await wr.close();
            } else {
                const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname;
                document.body.appendChild(a); a.click();
                await new Promise(r=>setTimeout(r,200));
                URL.revokeObjectURL(a.href); a.remove();
            }
            success++;
        }catch(e){ console.warn(e); fail++; }
        await new Promise(r=>setTimeout(r,80));
    }
    setStatus(`Done. ✓${success} ✗${fail}`);
    if(fail>0) alert(`Done. Success: ${success}, Failed: ${fail}`);
    renderPage();
}

// ── Render ──────────────────────────────────────────────────────────────
function renderPage(){
    const start     = (currentPage-1)*PAGE_SIZE;
    const pageLinks = filtered.slice(start, start+PAGE_SIZE);
    const grid      = document.getElementById('imageGrid');
    grid.innerHTML  = pageLinks.map((item,i)=>{
        const idx   = start+i;
        const fname = item.url.split('/').pop();
        return `
        <div class="img-card">
            <input type="checkbox" class="img-check" data-idx="${idx}">
            <img src="${item.url}" alt="${item.iid}" data-iid="${item.iid}" data-idx="${idx}" loading="lazy">
            <div style="font-size:11px;font-weight:600;">${item.iid}</div>
            <div style="font-size:11px;">Cls ${item.cls} | Sec ${item.section}</div>
            <div style="font-size:11px;">Roll: ${item.roll}</div>
            <div style="font-size:11px;word-break:break-all;">${item.name||fname}</div>
            <button class="card-btn img-download-btn" data-idx="${idx}" disabled>⬇ Save</button>
        </div>`;
    }).join('');

    // Enable card download button when image loads
    grid.querySelectorAll('.img-card img').forEach(img=>{
        const enable=()=>{ const btn=img.parentElement.querySelector('.img-download-btn'); if(btn) btn.disabled=false; };
        img.onload=enable;
        if(img.complete && img.naturalWidth>0) enable();
    });

    // Card-level single download
    grid.querySelectorAll('.img-download-btn').forEach(btn=>{
        btn.onclick=async()=>{
            const idx  = parseInt(btn.dataset.idx);
            const item = filtered[idx]; if(!item) return;
            btn.disabled=true; btn.textContent='…';
            const { w, h, kb } = getSizeSettings();
            const fname = item.url.split('/').pop();
            try{
                const blob = await processImage(item.url, w, h, kb);
                if(blob) await downloadBlob(blob, fname);
            }catch(e){ alert('Download failed: '+e.message); }
            btn.disabled=false; btn.textContent='⬇ Save';
        };
    });

    document.getElementById('pageInfo').textContent  = `Page ${currentPage} of ${totalPages} (${filtered.length} photos)`;
    document.getElementById('prevPageBtn').disabled  = currentPage===1;
    document.getElementById('nextPageBtn').disabled  = currentPage===totalPages;
    document.getElementById('downloadZipBtn').disabled = true;
    document.getElementById('downloadJpgBtn').disabled = true;
}

// ── Bulk JPG button ───────────────────────────────────────────────────────
document.getElementById('downloadJpgBtn').onclick = async()=>{
    const checked = Array.from(document.querySelectorAll('.img-check')).filter(cb=>cb.checked);
    if(!checked.length) return;
    const items = checked.map(cb=>filtered[parseInt(cb.dataset.idx)]).filter(Boolean);
    document.getElementById('downloadJpgBtn').disabled=true;
    await bulkJpgToDirectory(items);
    document.getElementById('downloadJpgBtn').disabled=false;
};

// ── Bulk ZIP button ───────────────────────────────────────────────────────
document.getElementById('downloadZipBtn').onclick = async()=>{
    const checked = Array.from(document.querySelectorAll('.img-check')).filter(cb=>cb.checked);
    if(!checked.length) return;
    const { w, h, kb } = getSizeSettings();
    const zip = new JSZip();
    let success=0, fail=0;
    document.getElementById('downloadZipBtn').disabled=true;
    setStatus('Building ZIP…');

    for(const cb of checked){
        const idx  = parseInt(cb.dataset.idx);
        const item = filtered[idx]; if(!item){ fail++; continue; }
        const fname= item.url.split('/').pop();
        try{
            const blob = await processImage(item.url, w, h, kb);
            if(blob){ zip.file(fname, blob); success++; } else fail++;
        }catch(e){ console.warn(e); fail++; }
        await new Promise(r=>setTimeout(r,60));
    }

    const content = await zip.generateAsync({type:'blob'});
    const zipName = `photos_${document.getElementById('sessionSel').value||'all'}_p${currentPage}.zip`;

    if(window.showSaveFilePicker){
        try{
            const fh = await window.showSaveFilePicker({
                suggestedName: zipName,
                types:[{ description:'ZIP archive', accept:{'application/zip':['.zip']} }]
            });
            const wr = await fh.createWritable();
            await wr.write(content);
            await wr.close();
        }catch(e){
            if(e.name!=='AbortError'){
                const a=document.createElement('a'); a.href=URL.createObjectURL(content); a.download=zipName;
                document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},4000);
            }
        }
    } else {
        const a=document.createElement('a'); a.href=URL.createObjectURL(content); a.download=zipName;
        document.body.appendChild(a); a.click(); setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},4000);
    }

    setStatus(`ZIP done. ✓${success} ✗${fail}`);
    if(fail>0) alert(`ZIP complete. Success: ${success}, Failed: ${fail}`);
    document.getElementById('downloadZipBtn').disabled=false;
    renderPage();
};

// ── UI wiring ──────────────────────────────────────────────────────────────
document.getElementById('prevPageBtn').onclick  = ()=>{ if(currentPage>1){ currentPage--; renderPage(); } };
document.getElementById('nextPageBtn').onclick  = ()=>{ if(currentPage<totalPages){ currentPage++; renderPage(); } };
document.getElementById('selectAllBtn').onclick = ()=>{
    document.querySelectorAll('.img-check').forEach(cb=>cb.checked=true);
    document.getElementById('downloadZipBtn').disabled=false;
    document.getElementById('downloadJpgBtn').disabled=false;
};
document.getElementById('imageGrid').addEventListener('change',()=>{
    const any = Array.from(document.querySelectorAll('.img-check')).some(cb=>cb.checked);
    document.getElementById('downloadZipBtn').disabled=!any;
    document.getElementById('downloadJpgBtn').disabled=!any;
});
document.getElementById('searchBox').addEventListener('input', applySearch);
document.getElementById('sessionSel').addEventListener('change', onSessionChange);
document.getElementById('classSel').addEventListener('change', onClassChange);
document.getElementById('loadBtn').addEventListener('click', fetchPhotos);

// ── Init ──────────────────────────────────────────────────────────────────
(function wait(at=0){
    if(window.supabase || at>40){ discoverSessionCols(); return; }
    setTimeout(()=>wait(at+1), 100);
})();
</script>
</body>
</html>
