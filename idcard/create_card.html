<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generate ID Cards</title>
  <link href="https://fonts.maateen.me/kalpurush/font.css" rel="stylesheet">
  <style>
    /* ── page ──────────────────────────────────────────── */
    body {
      margin: 0;
      padding: 0.7cm;
      background: #b0b0b0;
      font-family: 'Kalpurush', 'Noto Sans Bengali', sans-serif;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.4cm;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 0.6cm;
    }

    .toolbar .title {
      font-size: 1rem;
      font-weight: 700;
    }

    .toolbar button {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: .42rem .9rem;
      font-size: .85rem;
      cursor: pointer;
    }

    .toolbar button:hover {
      background: #1d4ed8;
    }

    .toolbar button.green {
      background: #16a34a;
    }

    .toolbar button.green:hover {
      background: #15803d;
    }

    #exportStatus {
      font-size: .82rem;
      color: #1e293b;
    }

    #cards {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5cm;
      justify-content: flex-start;
    }

    /* ══════════════════════════════════════════════════
       CARD  ─  625 × 1003 px @300 DPI = 5.29 × 8.49 cm
    ══════════════════════════════════════════════════ */
    .id-card {
      position: relative;
      width: 5.29cm;
      height: 8.49cm;
      background: #fff;
      box-sizing: border-box;
      overflow: hidden;
      break-inside: avoid;
      page-break-inside: avoid;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      border: 1px solid #ddd;
      /* Subtle border for visualization */
    }

    /* ── Card Header & Curves ────────────────────────── */
    .id-card .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3.5cm;
      z-index: 10;
      overflow: visible;
    }

    .id-card .header .curve-layers {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .id-card .header-content {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0.9cm 0.25cm 0 0.25cm;
      z-index: 10;
      color: #fff;
    }

    .id-card .header .logo {
      width: 1.0cm;
      height: 1.0cm;
      flex-shrink: 0;
      z-index: 20;
    }

    .id-card .header .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .id-card .header .school-info {
      flex: 1;
      text-align: center;
    }

    .id-card .header .school-name {
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      font-size: 0.48rem;
      font-weight: 800;
      margin: 0;
      line-height: 1.1;
      text-transform: uppercase;
    }

    .id-card .header .school-addr {
      font-size: 0.28rem;
      margin: 0.03cm 0 0 0;
      font-weight: 700;
    }

    .id-card .header .school-est {
      font-size: 0.28rem;
      font-weight: 700;
      margin-top: 0.02cm;
    }

    /* ── Background Patterns ────────────────────────── */
    .id-card .bg-decoration {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #f7f9fb;
      background-image:
        linear-gradient(rgba(115, 133, 151, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(115, 133, 151, 0.07) 1px, transparent 1px);
      background-size: 0.16cm 0.16cm;
      z-index: 0;
    }

    .id-card .bg-gradient {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 180, 0.15) 100%);
      z-index: 1;
    }

    /* ── Photo ─────────────────────────────────────── */
    /* Background.png has a photo placeholder box;
       measure from 0,0 of the card.
       These values are calibrated to the actual template.
       In pixels on the 625×1003 image the photo box is
       roughly x=185–440 , y=295–595  → percentages used
       so they scale exactly with the card cm size.         */
    .id-card .photo {
      position: absolute;
      /* 233px / 300 DPI * 2.54 = 1.97 cm approx */
      top: 1.97cm;
      left: 50%;
      transform: translateX(-50%);
      width: 2.3cm;
      height: 2.8cm;
      overflow: hidden;
      background: #fff;
      border: 1.8px solid #ff7300;
      box-sizing: border-box;
      z-index: 50;
    }

    .id-card .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* ── Student Name ────────────────────────────────── */
    .id-card .stu-name {
      position: absolute;
      top: 4.9cm;
      left: 0.1cm;
      right: 0.1cm;
      text-align: center;
      font-weight: 800;
      font-size: 0.6rem;
      text-transform: uppercase;
      color: #000;
      line-height: 1.1;
      z-index: 20;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
    }

    .id-card .qr-placeholder {
      position: absolute;
      top: 6.8cm;
      left: 50%;
      transform: translateX(-50%);
      width: 1.1cm;
      height: 1.1cm;
      z-index: 20;
    }

    .id-card .qr-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ── Detail rows ─────────────────────────────────── */
    .id-card .details {
      position: absolute;
      top: 5.6cm;
      left: 0.35cm;
      right: 0.1cm;
      font-size: 0.48rem;
      line-height: 1.45;
      color: #000;
      z-index: 20;
      font-family: 'Inter', 'Segoe UI', sans-serif;
    }

    .id-card .details .lbl {
      flex: 0 0 1.8cm;
      font-weight: 700;
      white-space: nowrap;
    }

    .id-card .details .row {
      display: flex;
    }

    .id-card .details .val {
      flex: 1;
    }

    /* ── Footer: Issue / Valid ───────────────────────── */
    .id-card .foot {
      position: absolute;
      bottom: 0.1cm;
      left: 0.18cm;
      right: 0.18cm;
      font-size: 0.4rem;
      color: #333;
      display: flex;
      justify-content: center;
    }

    /* ── Print ───────────────────────────────────────── */
    @media print {
      body {
        padding: 0;
        background: white;
      }

      .toolbar {
        display: none;
      }

      #cards {
        gap: 0.3cm;
      }
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <span class="title">🎴 ID Cards</span>
    <button onclick="window.print()">🖨️ Print / PDF</button>
    <button class="green" id="exportBtn" onclick="exportCards()">💾 Export PNG to Folder</button>
    <button onclick="history.back()">← Back</button>
    <span id="exportStatus"></span>
  </div>
  <div id="cards"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"
    integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script>
    const SUPABASE_URL = 'https://rtfefxghfbtirfnlbucb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0ZmVmeGdoZmJ0aXJmbmxidWNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA1MDg3OTcsImV4cCI6MjA1NjA4NDc5N30.fb7_myCmFzbV7WPNjFN_NEl4z0sOmRCefnkQbk6c10w';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* Issue / Valid dates – update as needed */
    const ISSUE_DATE = 'August 22, 2025';
    const VALID_TILL = 'December 31, 2029';

    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/</g, '&gt;');
    }

    /* ── Build cards from Supabase ──────────────────── */
    async function loadCards() {
      const params = new URLSearchParams(location.search);
      const iidsParam = params.get('iids') || '';
      const iids = iidsParam.split(',').map(s => s.trim()).filter(Boolean);
      const container = document.getElementById('cards');

      if (!iids.length) { container.innerHTML = '<p>No students selected.</p>'; return; }
      const numericIds = iids.map(Number).filter(n => n > 0);
      if (!numericIds.length) { container.innerHTML = '<p>No valid IID values.</p>'; return; }

      try {
        const { data, error } = await sbClient
          .from('student_database')
          .select('iid, student_name_en, father_name_en, father_mobile, student_photo_url, active_class, active_section, active_roll')
          .in('iid', numericIds);
        if (error) throw error;
        if (!data?.length) { container.innerHTML = '<p>No matching records found.</p>'; return; }

        data.sort((a, b) => iids.indexOf(String(a.iid)) - iids.indexOf(String(b.iid)));

        data.forEach(rec => buildCard(rec, container));
      } catch (err) {
        console.error(err);
        container.innerHTML = `<p>Error: ${esc(err.message)}</p>`;
      }
    }

    function buildCard(rec, container) {
      const card = document.createElement('div');
      card.className = 'id-card';
      card.dataset.iid = rec.iid;
      card.dataset.name = (rec.student_name_en || 'student').replace(/\s+/g, '_');

      /* Background */
      const bgDeco = document.createElement('div');
      bgDeco.className = 'bg-decoration';
      card.appendChild(bgDeco);

      /* Header */
      const header = document.createElement('div');
      header.className = 'header';
      header.innerHTML = `
        <div class="curve-layers">
          <svg viewBox="0 0 500 250" preserveAspectRatio="none" style="width:100%; height:100%; display:block;">
            <!-- Dark Blue Stripe -->
            <path d="M0,0 L500,0 L500,165 Q375,130 250,175 T0,185 Z" fill="#003a8c" />
            <!-- Light Blue Main -->
            <path d="M0,0 L500,0 L500,145 Q375,110 250,155 T0,165 Z" fill="#0076c0" />
          </svg>
        </div>
        <div class="header-content">
          <div class="logo"><img src="school_logo.png" alt="Logo"></div>
          <div class="school-info">
            <h1 class="school-name">Feni Model High School</h1>
            <p class="school-addr">Trunk Road, Feni Sadar, Feni</p>
            <p class="school-est">Established : 1927, EIIN : 106584</p>
          </div>
        </div>
      `;
      card.appendChild(header);

      /* Photo */
      const photoDiv = document.createElement('div');
      photoDiv.className = 'photo';
      const img = document.createElement('img');
      img.crossOrigin = 'anonymous';
      img.alt = 'Photo';
      img.onerror = () => { img.onerror = null; img.src = 'referance_photo.jpg'; };
      img.src = rec.student_photo_url || 'referance_photo.jpg';
      photoDiv.appendChild(img);
      card.appendChild(photoDiv);

      /* Name */
      const nameDiv = document.createElement('div');
      nameDiv.className = 'stu-name';
      nameDiv.textContent = rec.student_name_en || '';
      card.appendChild(nameDiv);

      /* Details */
      const det = document.createElement('div');
      det.className = 'details';
      det.innerHTML = `
        <div class="row"><span class="lbl">Father's Name</span><span class="val">: &nbsp;${esc(rec.father_name_en)}</span></div>
        <div class="row"><span class="lbl">Mobile</span><span class="val">: &nbsp;${esc(rec.father_mobile)}</span></div>
        <div class="row"><span class="lbl">IID</span><span class="val">: &nbsp;${esc(rec.iid)}</span></div>
      `;
      card.appendChild(det);

      /* QR Placeholder - Recolor to Orange #ff7300 */
      const qrDiv = document.createElement('div');
      qrDiv.className = 'qr-placeholder';
      qrDiv.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=ff7300&data=${rec.iid}" alt="QR">`;
      card.appendChild(qrDiv);

      /* Footer */
      const foot = document.createElement('div');
      foot.className = 'foot';
      foot.style.fontSize = '0.35rem';
      foot.innerHTML = `<span>Issue Date : ${ISSUE_DATE}</span>`;
      card.appendChild(foot);

      container.appendChild(card);
    }

    /* ── Export PNG to folder ───────────────────────── */
    /*  scale: 300 DPI / 96 CSS DPI = 3.125
        → renders each card at exactly 625×1003 px       */
    const EXPORT_SCALE = 3.125;

    async function renderCard(card) {
      return html2canvas(card, {
        scale: EXPORT_SCALE,
        useCORS: true,
        allowTaint: false,
        backgroundColor: null,
        logging: false,
        onclone: (clonedDoc) => {
          /* Background and images are now part of the DOM, html2canvas will pick them up */
        }
      });
    }

    async function exportCards() {
      const cards = [...document.querySelectorAll('.id-card')];
      if (!cards.length) { alert('No cards to export.'); return; }

      const btn = document.getElementById('exportBtn');
      const status = document.getElementById('exportStatus');
      btn.disabled = true;

      /* ── Chrome/Edge: File System Access API ─────── */
      if (window.showDirectoryPicker) {
        let dirHandle;
        try {
          dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
        } catch (e) {
          btn.disabled = false;
          return; /* user cancelled */
        }
        status.textContent = 'Exporting…';
        let done = 0;
        for (const card of cards) {
          const iid = card.dataset.iid || done;
          const name = card.dataset.name || 'student';
          const filename = `idcard_${iid}_${name}.png`;
          try {
            const canvas = await renderCard(card);
            const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
            const fh = await dirHandle.getFileHandle(filename, { create: true });
            const wr = await fh.createWritable();
            await wr.write(blob);
            await wr.close();
          } catch (e) { console.error('Export error:', filename, e); }
          done++;
          status.textContent = `Exporting… ${done} / ${cards.length}`;
        }
        status.textContent = `✅ ${done} cards saved to folder.`;

      } else {
        /* ── Fallback: individual download links ───── */
        status.textContent = 'Downloading (no folder picker in this browser)…';
        let done = 0;
        for (const card of cards) {
          const iid = card.dataset.iid || done;
          const name = card.dataset.name || 'student';
          const filename = `idcard_${iid}_${name}.png`;
          try {
            const canvas = await renderCard(card);
            const a = document.createElement('a');
            a.download = filename;
            a.href = canvas.toDataURL('image/png');
            a.click();
            await new Promise(r => setTimeout(r, 500));
          } catch (e) { console.error(e); }
          done++;
          status.textContent = `Downloaded ${done} / ${cards.length}`;
        }
        status.textContent = `✅ ${done} cards downloaded.`;
      }

      btn.disabled = false;
    }

    window.addEventListener('DOMContentLoaded', loadCards);
  </script>
</body>

</html>
